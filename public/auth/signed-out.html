<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signed out</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 2rem 2.5rem; text-align: center; max-width: 360px; }
    h1 { font-size: 1.1rem; margin: 0 0 0.5rem; color: #111; }
    p { font-size: 0.875rem; color: #666; margin: 0 0 1.25rem; }
    a { display: inline-block; padding: 0.5rem 1.25rem; background: #4a7cf6; color: white; border-radius: 4px; text-decoration: none; font-size: 0.875rem; font-weight: 600; }
    a:hover { background: #3b6de0; }
    .success { font-size: 2rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="success">&#10003;</div>
    <h1>You're signed out</h1>
    <p>If the workaround is working, you landed here directly.<br>If the bug is present, you saw the login page instead.</p>
    <a href="/">Sign in again</a>
  </div>
</body>
</html>
